<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RotaMais - CRUD de Motoristas</title>
<link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <main class="container">
        <header class="cabecalho">
            <p class="tag">RotaMais - Sistema de Gestão</p>
            <h1>Gerenciamento de Motoristas</h1>
            <p>Frontend simples consumindo a API Flask do RotaMais.</p>
        </header>

        <section class="card">
            <h2 id="titulo-formulario">Cadastrar motorista</h2>

            <form id="form-motorista">
                <input type="hidden" id="motorista-id">

                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex.: João Silva" required>

                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="Ex.: 123.456.789-00" required>

                <label for="cnh">CNH</label>
                <input type="text" id="cnh" placeholder="Ex.: 12345678900" required>

                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" placeholder="Ex.: (11) 99999-9999">

                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Ex.: joao@email.com">

                <div class="acoes-formulario">
                    <button type="submit" id="botao-salvar">Salvar</button>
                    <button type="button" id="botao-cancelar" class="secundario">Cancelar edição</button>
                </div>
            </form>

            <p id="mensagem" class="mensagem"></p>
        </section>

        <section class="card">
            <div class="topo-lista">
                <h2>Motoristas cadastrados</h2>
                <button id="botao-recarregar" class="secundario">Recarregar</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>CNH</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-motoristas">
                    <tr>
                        <td colspan="5">Carregando motoristas...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="js/motoristas.js"></script>
</body>
</html>
