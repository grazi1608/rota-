<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RotaMais - CRUD de Veículos</title>
<link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <main class="container">
        <header class="cabecalho">
            <p class="tag">RotaMais - Sistema de Gestão</p>
            <h1>Gerenciamento de Veículos</h1>
            <p>Frontend simples consumindo a API Flask do RotaMais.</p>
        </header>

        <section class="card">
            <h2 id="titulo-formulario">Cadastrar veículo</h2>

            <form id="form-veiculo">
                <input type="hidden" id="veiculo-id">

                <label for="marca">Marca</label>
                <input type="text" id="marca" placeholder="Ex.: Volkswagen" required>

                <label for="modelo">Modelo</label>
                <input type="text" id="modelo" placeholder="Ex.: Gol Polo" required>

                <label for="placa">Placa</label>
                <input type="text" id="placa" placeholder="Ex.: ABC1D23" required>

                <label for="ano">Ano</label>
                <input type="number" id="ano" placeholder="Ex.: 2023" required>

                <label for="motorista_id">Motorista Responsável</label>
                <select id="motorista_id" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; background: white;">
                    <option value="">Selecione um motorista...</option>
                </select>

                <div class="acoes-formulario">
                    <button type="submit" id="botao-salvar">Salvar</button>
                    <button type="button" id="botao-cancelar" class="secundario">Cancelar edição</button>
                </div>
            </form>

            <p id="mensagem" class="mensagem"></p>
        </section>

        <section class="card">
            <div class="topo-lista">
                <h2>Veículos cadastrados</h2>
                <button id="botao-recarregar" class="secundario">Recarregar</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Marca/Modelo</th>
                        <th>Placa</th>
                        <th>Ano</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-veiculos">
                    <tr>
                        <td colspan="5">Carregando veículos...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="js/veiculos.js"></script>
</body>
</html>
