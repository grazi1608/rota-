<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RotaMais - CRUD de Metas</title>
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <main class="container">
        <header class="cabecalho">
            <p class="tag">RotaMais - Sistema de Gestão</p>
            <h1>Definição de Metas Financeiras</h1>
        </header>

        <section class="card">
            <h2 id="titulo-formulario">Estipular Nova Meta</h2>
            <form id="form-meta">
                <input type="hidden" id="meta-id">

                <label for="valor_meta">Valor Alvo (R$)</label>
                <input type="number" id="valor_meta" step="0.01" required>

                <label for="data_inicio">Data de Início</label>
                <input type="date" id="data_inicio" required>

                <label for="data_fim">Data de Fim</label>
                <input type="date" id="data_fim" required>

                <label for="motorista_id">Motorista</label>
                <select id="motorista_id" required style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; background: white;">
                    <option value="">Selecione...</option>
                </select>

                <div class="acoes-formulario">
                    <button type="submit" id="botao-salvar">Salvar Meta</button>
                    <button type="button" id="botao-cancelar" class="secundario">Cancelar</button>
                </div>
            </form>
            <p id="mensagem" class="mensagem"></p>
        </section>

        <section class="card">
            <div class="topo-lista">
                <h2>Metas Ativas</h2>
                <button id="botao-recarregar" class="secundario">Recarregar</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Meta Alvo</th>
                        <th>Período</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-metas">
                    <tr>
                        <td colspan="5">Carregando metas...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="../static/jv/metas.js"></script>
</body>
</html>
